<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title data-translate-key="dashboardTitle">SafetyFirst – Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body.dashboard .highlight-ticker { display:none !important; }
    .nav-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .lang-switch {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 14px;
      cursor: pointer;
    }
    /* Table alignment fixes */
    .dashboard-table {
      width: 100%;
      border-collapse: collapse;
    }
    .dashboard-table th,
    .dashboard-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: middle;
    }
    .dashboard-table th {
      background-color: #f9fafb;
      font-weight: 600;
      color: #374151;
    }
    .dashboard-table td {
      color: #1f2937;
    }
    .dashboard-table tr:hover {
      background-color: #f9fafb;
    }
    .text-center {
      text-align: center;
    }
    .text-right {
      text-align: right;
    }
  </style>
</head>
<body class="dashboard bg-gray-50 font-sans">
  <nav class="bg-white shadow px-4 py-3 flex items-center justify-between">
    <span class="font-bold text-xl text-blue-600" data-translate-key="dashboardTitle">SafetyFirst Admin</span>
    <div class="nav-controls">
      <!-- Language Switcher -->
      <select id="lang-switch" class="lang-switch">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="mr">मराठी</option>
        <option value="pa">ਪੰਜਾਬੀ</option>
        <option value="kn">ಕನ್ನಡ</option>
        <option value="ta">தமிழ்</option>
      </select>
      <a href="index1.html" class="text-sm text-blue-600 hover:underline" data-translate-key="backToSite">← Back to Site</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto p-4 grid gap-6">
    <!-- Stats Section -->
    <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-sm text-gray-500" data-translate-key="totalStudents">Total Students</h3>
        <p id="totalStudents" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-sm text-gray-500" data-translate-key="avgPreparedness">Avg Preparedness</h3>
        <p id="avgScore" class="text-2xl font-bold">0%</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-sm text-gray-500" data-translate-key="drillsThisMonth">Drills This Month</h3>
        <p id="drillCount" class="text-2xl font-bold">0</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <h3 class="text-sm text-gray-500" data-translate-key="lowestClass">Lowest Class</h3>
        <p id="lowestClass" class="text-2xl font-bold">-</p>
      </div>
    </section>

    <!-- Tables -->
    <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-white rounded shadow overflow-x-auto">
        <h2 class="p-4 font-bold text-lg" data-translate-key="preparednessScores">Preparedness Scores</h2>
        <table class="dashboard-table">
          <thead>
            <tr>
              <th data-translate-key="name">Name</th>
              <th data-translate-key="class">Class</th>
              <th data-translate-key="score" class="text-center">Score</th>
              <th data-translate-key="lastDrill">Last Drill</th>
            </tr>
          </thead>
          <tbody id="scoreTable"></tbody>
        </table>
      </div>

      <div class="bg-white rounded shadow overflow-x-auto">
        <h2 class="p-4 font-bold text-lg" data-translate-key="drillParticipation">Drill Participation</h2>
        <table class="dashboard-table">
          <thead>
            <tr>
              <th data-translate-key="class">Class</th>
              <th data-translate-key="students" class="text-center">Students</th>
              <th data-translate-key="attended" class="text-center">Attended</th>
              <th class="text-center">%</th>
            </tr>
          </thead>
          <tbody id="drillTable"></tbody>
        </table>
      </div>
    </section>

    <!-- Chart -->
    <section class="bg-white rounded shadow p-4">
      <h2 class="font-bold text-lg mb-2" data-translate-key="classReadinessOverview">Class Readiness Overview</h2>
      <canvas id="readinessChart" height="120"></canvas>
    </section>
  </main>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase SDK (same as index.html) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyAJO8evM1zTHiKk9LgQoD9JQ0yCJzHcFB4",
      authDomain: "disaster-management-1f766.firebaseapp.com",
      projectId: "disaster-management-1f766",
      storageBucket: "disaster-management-1f766.firebasestorage.app",
      messagingSenderId: "570748616582",
      appId: "1:570748616582:web:f3cb38a280a7a3c4fbf607",
      measurementId: "G-T2M5PQVHNY"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.addEventListener('DOMContentLoaded', () => {
      auth.onAuthStateChanged(user => {
        if (user) {
          const isAdmin = localStorage.getItem("isAdmin") === "true";
          if (isAdmin) {
            loadDashboardData();
          } else {
            alert("You are not authorized to view this page.");
            window.location.href = 'index1.html';
          }
        } else {
          window.location.href = 'index.html';
        }
      });
    });

    async function loadDashboardData() {
      const usersSnapshot = await db.collection('users').get();
      const users = {};
      usersSnapshot.forEach(doc => {
        users[doc.id] = doc.data();
      });

      const quizResultsSnapshot = await db.collection('quizResults').get();
      const quizResults = quizResultsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

      renderDashboard(users, quizResults);
    }

    function assignClass(userId) {
      const classes = ["8-A", "7-B", "9-A", "8-B", "7-A"];
      let hash = 0;
      for (let i = 0; i < userId.length; i++) {
        hash = (hash << 5) - hash + userId.charCodeAt(i);
        hash |= 0;
      }
      return classes[Math.abs(hash) % classes.length];
    }

    function renderDashboard(users, quizResults) {
      const totalStudents = Object.keys(users).length;
      document.getElementById('totalStudents').textContent = totalStudents;

      const totalPercentage = quizResults.reduce((sum, result) => sum + result.percentage, 0);
      const avgScore = quizResults.length > 0 ? Math.round(totalPercentage / quizResults.length) : 0;
      document.getElementById('avgScore').textContent = `${avgScore}%`;

      const oneMonthAgo = new Date();
      oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
      const drillsThisMonth = quizResults.filter(r => r.date.toDate() > oneMonthAgo).length;
      document.getElementById('drillCount').textContent = drillsThisMonth;

      const latestScores = {};
      quizResults.forEach(result => {
        if (!latestScores[result.userId] || result.date.toMillis() > latestScores[result.userId].date.toMillis()) {
          latestScores[result.userId] = result;
        }
      });

      const scoreTableBody = document.getElementById('scoreTable');
      scoreTableBody.innerHTML = Object.keys(latestScores).map(userId => {
        const user = users[userId];
        const result = latestScores[userId];
        if (!user) return '';
        return `<tr>
                  <td>${user.name}</td>
                  <td>${assignClass(userId)}</td>
                  <td class="text-center font-bold">${result.percentage}%</td>
                  <td>${result.date.toDate().toLocaleDateString()}</td>
                </tr>`;
      }).join('');

      const classData = {};
      for (const userId in users) {
        const userClass = assignClass(userId);
        if (!classData[userClass]) {
          classData[userClass] = { total: 0, attended: 0, scores: [] };
        }
        classData[userClass].total++;
        if (latestScores[userId]) {
          classData[userClass].attended++;
          classData[userClass].scores.push(latestScores[userId].percentage);
        }
      }

      let lowestClass = { name: '-', ratio: 1 };
        for (const className in classData) {
            const data = classData[className];
            const ratio = data.total > 0 ? data.attended / data.total : 0;
            if (ratio < lowestClass.ratio) {
                lowestClass = { name: className, ratio: ratio };
            }
        }
      document.getElementById('lowestClass').textContent = lowestClass.name;
      
      const drillTableBody = document.getElementById('drillTable');
      drillTableBody.innerHTML = Object.keys(classData).map(className => {
          const data = classData[className];
          const percentage = data.total > 0 ? Math.round((data.attended / data.total) * 100) : 0;
          return `<tr>
                    <td>${className}</td>
                    <td class="text-center">${data.total}</td>
                    <td class="text-center">${data.attended}</td>
                    <td class="text-center font-bold">${percentage}%</td>
                  </tr>`;
      }).join('');

      const chartLabels = Object.keys(classData);
      const chartData = chartLabels.map(className => {
        const scores = classData[className].scores;
        return scores.length > 0 ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
      });

      const existingChart = Chart.getChart("readinessChart");
      if (existingChart) {
        existingChart.destroy();
      }
      new Chart(document.getElementById('readinessChart'), {
        type:'bar',
        data:{
          labels: chartLabels,
          datasets:[{
            label: 'Readiness %',
            data: chartData,
            backgroundColor:'#3b82f6',
            borderColor: '#2563eb',
            borderWidth: 1
          }]
        },
        options:{
          responsive: true,
          maintainAspectRatio: false,
          scales:{ y:{ beginAtZero:true, max:100, ticks: { callback: (v) => v + '%' } } },
          plugins: { legend: { display: true, position: 'top' } }
        }
      });
    }
  </script>
</body>
</html>
